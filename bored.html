<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Bored? — Whips Washing</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #f0ece4;
      --muted: #a8a09a;
      --card: #111111;
      --border: #1e1e1e;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
      z-index: 100;
    }
    .back-link:hover { color: var(--gold); }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 700px;
      padding: 1rem;
    }

    .game-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: 0.1em;
      color: var(--gold);
      text-align: center;
    }

    .score-board {
      display: flex;
      gap: 3rem;
      align-items: center;
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .score-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .score-value.gold { color: var(--gold); }

    /* GAME CANVAS WRAPPER */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8,8,8,0.88);
      gap: 0.8rem;
      transition: opacity 0.3s;
    }

    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.1em;
      color: var(--gold);
      text-align: center;
    }

    .overlay-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-style: italic;
      color: var(--muted);
      text-align: center;
    }

    .overlay-btn {
      margin-top: 0.5rem;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      border: none;
      padding: 0.85rem 2rem;
      cursor: pointer;
      border-radius: 1px;
      transition: background 0.3s;
    }

    .overlay-btn:hover { background: var(--gold-light); }

    .hint {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-align: center;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← Back to site</a>

  <div class="game-container">
    <div class="game-title">WHIPS RUNNER</div>

    <div class="score-board">
      <div class="score-item">
        <div class="score-label">Score</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">Best</div>
        <div class="score-value gold" id="best">0</div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <!-- Start overlay -->
      <div class="overlay" id="overlay">
        <div class="overlay-title">WHIPS RUNNER</div>
        <div class="overlay-sub">Help the lightbulb dodge the whips!</div>
        <button class="overlay-btn" id="startBtn">START GAME</button>
        <div class="hint">SPACE or TAP to jump · TAP TWICE to double jump</div>
      </div>
    </div>

    <div class="hint" id="controlHint">SPACE or TAP to jump · Double jump available!</div>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlayTitle = overlay.querySelector('.overlay-title');
const overlaySub = overlay.querySelector('.overlay-sub');

// Canvas sizing
const W = 700;
const H = 200;
canvas.width = W;
canvas.height = H;

const GROUND = H - 30;
const GRAVITY = 0.6;
const JUMP_FORCE = -13;
let bestScore = 0;

// Game state
let gameRunning = false;
let gameWon = false;
let score = 0;
let confettiPieces = [];
let frame = 0;
let speed = 5;
let obstacles = [];
let nextObstacle = 80;
let animId;

// Bulb
const bulb = {
  x: 80,
  y: GROUND,
  w: 38,
  h: 48,
  vy: 0,
  jumps: 0,
  maxJumps: 2,
  grounded: true,

  jump() {
    if (this.jumps < this.maxJumps) {
      this.vy = this.jumps === 0 ? JUMP_FORCE : JUMP_FORCE * 0.85;
      this.grounded = false;
      this.jumps++;
    }
  },

  update() {
    this.vy += GRAVITY;
    this.y += this.vy;
    if (this.y >= GROUND) {
      this.y = GROUND;
      this.vy = 0;
      this.grounded = true;
      this.jumps = 0;
    }
  },

  draw() {
    const cx = this.x + this.w / 2;
    const cy = this.y - this.h / 2;
    const r = this.w / 2;
    const bounce = this.grounded ? Math.sin(frame * 0.15) * 1.5 : 0;

    ctx.save();
    ctx.translate(cx, cy + bounce);

    // Glow
    const glow = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 1.4);
    glow.addColorStop(0, 'rgba(201,168,76,0.25)');
    glow.addColorStop(1, 'rgba(201,168,76,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // Bulb body
    const bodyGrad = ctx.createRadialGradient(-r * 0.25, -r * 0.25, 0, 0, 0, r);
    bodyGrad.addColorStop(0, '#ffe87a');
    bodyGrad.addColorStop(0.5, '#c9a84c');
    bodyGrad.addColorStop(1, '#8a6520');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, -r * 0.1, r, 0, Math.PI * 2);
    ctx.fill();

    // Bulb base / thread
    ctx.fillStyle = '#5a5a5a';
    ctx.beginPath();
    ctx.roundRect(-r * 0.38, r * 0.6, r * 0.76, r * 0.55, 3);
    ctx.fill();

    // Base lines
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const ly = r * 0.68 + i * (r * 0.55 / 3);
      ctx.beginPath();
      ctx.moveTo(-r * 0.38, ly);
      ctx.lineTo(r * 0.38, ly);
      ctx.stroke();
    }

    // X eyes
    const eyeY = -r * 0.2;
    const eyeSize = r * 0.18;
    ctx.strokeStyle = '#1a0e00';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';

    // Left X
    ctx.beginPath(); ctx.moveTo(-r * 0.32 - eyeSize, eyeY - eyeSize); ctx.lineTo(-r * 0.32 + eyeSize, eyeY + eyeSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r * 0.32 + eyeSize, eyeY - eyeSize); ctx.lineTo(-r * 0.32 - eyeSize, eyeY + eyeSize); ctx.stroke();

    // Right X
    ctx.beginPath(); ctx.moveTo(r * 0.32 - eyeSize, eyeY - eyeSize); ctx.lineTo(r * 0.32 + eyeSize, eyeY + eyeSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r * 0.32 + eyeSize, eyeY - eyeSize); ctx.lineTo(r * 0.32 - eyeSize, eyeY + eyeSize); ctx.stroke();

    // Smile
    ctx.strokeStyle = '#1a0e00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, eyeY + r * 0.28, r * 0.22, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.22, -r * 0.42, r * 0.18, r * 0.1, -0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
};

// Vehicle shapes
const vehicleTypes = [
  { name: 'sedan',   w: 72, h: 30, color: '#c0392b', roofH: 18, roofW: 0.55, roofX: 0.2 },
  { name: 'suv',     w: 80, h: 36, color: '#2980b9', roofH: 22, roofW: 0.7,  roofX: 0.1 },
  { name: 'truck',   w: 90, h: 38, color: '#27ae60', roofH: 20, roofW: 0.4,  roofX: 0.5 },
  { name: 'coupe',   w: 68, h: 28, color: '#8e44ad', roofH: 16, roofW: 0.5,  roofX: 0.2 },
  { name: 'pickup',  w: 85, h: 36, color: '#d35400', roofH: 18, roofW: 0.38, roofX: 0.48 },
];

let reindeerSpawned = false;
let reindeerActive = false;
let reindeerCar = null;

function drawVehicle(ob) {
  if (ob.isReindeer) { drawReindeerCar(ob); return; }
  const { x, y, type } = ob;
  const t = vehicleTypes[type];
  const bx = x;
  const by = y - t.h;

  ctx.save();

  // Body
  const bodyGrad = ctx.createLinearGradient(bx, by, bx, by + t.h);
  bodyGrad.addColorStop(0, lighten(t.color, 30));
  bodyGrad.addColorStop(1, t.color);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by, t.w, t.h, 4);
  ctx.fill();

  // Roof
  const roofX = bx + t.w * t.roofX;
  const roofW = t.w * t.roofW;
  const roofGrad = ctx.createLinearGradient(roofX, by - t.roofH, roofX, by);
  roofGrad.addColorStop(0, lighten(t.color, 20));
  roofGrad.addColorStop(1, t.color);
  ctx.fillStyle = roofGrad;
  ctx.beginPath();
  ctx.roundRect(roofX, by - t.roofH, roofW, t.roofH + 4, [4, 4, 0, 0]);
  ctx.fill();

  // Windows
  ctx.fillStyle = 'rgba(150,220,255,0.55)';
  ctx.beginPath();
  ctx.roundRect(roofX + 3, by - t.roofH + 3, roofW - 6, t.roofH - 4, 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  const wheelY = by + t.h - 1;
  const wheelR = t.h * 0.32;
  [bx + t.w * 0.2, bx + t.w * 0.78].forEach(wx => {
    ctx.beginPath();
    ctx.arc(wx, wheelY, wheelR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(wx, wheelY, wheelR * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
  });

  // Headlights
  ctx.fillStyle = 'rgba(255,255,180,0.9)';
  ctx.beginPath();
  ctx.roundRect(bx + t.w - 6, by + 6, 5, 8, 2);
  ctx.fill();

  // Tail lights
  ctx.fillStyle = 'rgba(255,60,60,0.85)';
  ctx.beginPath();
  ctx.roundRect(bx + 1, by + 6, 5, 8, 2);
  ctx.fill();

  ctx.restore();
}

function drawReindeerCar(ob) {
  const bx = ob.x;
  const by = ob.y - ob.h;
  const w = ob.w;
  const h = ob.h;

  ctx.save();

  // Car body - festive red
  const bodyGrad = ctx.createLinearGradient(bx, by, bx, by + h);
  bodyGrad.addColorStop(0, '#ff6b6b');
  bodyGrad.addColorStop(1, '#c0392b');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by, w, h, 4);
  ctx.fill();

  // Gold trim
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx + 2, by + 2, w - 4, h - 4, 3);
  ctx.stroke();

  // Roof
  const roofX = bx + w * 0.18;
  const roofW = w * 0.5;
  const roofH = 18;
  const roofGrad = ctx.createLinearGradient(roofX, by - roofH, roofX, by);
  roofGrad.addColorStop(0, '#ff8a8a');
  roofGrad.addColorStop(1, '#c0392b');
  ctx.fillStyle = roofGrad;
  ctx.beginPath();
  ctx.roundRect(roofX, by - roofH, roofW, roofH + 4, [4, 4, 0, 0]);
  ctx.fill();

  // Window
  ctx.fillStyle = 'rgba(150,220,255,0.6)';
  ctx.beginPath();
  ctx.roundRect(roofX + 3, by - roofH + 3, roofW - 6, roofH - 5, 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  const wheelY = by + h - 1;
  const wheelR = h * 0.32;
  [bx + w * 0.2, bx + w * 0.78].forEach(wx => {
    ctx.beginPath();
    ctx.arc(wx, wheelY, wheelR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.arc(wx, wheelY, wheelR * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
  });

  // Headlights - glowing blue nose color
  ctx.fillStyle = 'rgba(100,180,255,0.95)';
  ctx.beginPath();
  ctx.roundRect(bx + w - 6, by + 6, 5, 8, 2);
  ctx.fill();

  // Tail lights
  ctx.fillStyle = 'rgba(255,60,60,0.9)';
  ctx.beginPath();
  ctx.roundRect(bx + 1, by + 6, 5, 8, 2);
  ctx.fill();

  // ====== REINDEER ON TOP ======
  const rx = roofX + roofW * 0.5; // center of roof
  const ry = by - roofH;           // top of roof

  // Reindeer body
  ctx.fillStyle = '#b5651d';
  ctx.beginPath();
  ctx.ellipse(rx, ry - 14, 16, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Reindeer legs (dangling off car sides)
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  // Front legs
  ctx.beginPath(); ctx.moveTo(rx - 8, ry - 8); ctx.lineTo(rx - 10, ry + 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx - 4, ry - 8); ctx.lineTo(rx - 5, ry + 2); ctx.stroke();
  // Back legs
  ctx.beginPath(); ctx.moveTo(rx + 4, ry - 8); ctx.lineTo(rx + 5, ry + 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + 8, ry - 8); ctx.lineTo(rx + 10, ry + 2); ctx.stroke();

  // Reindeer neck
  ctx.fillStyle = '#b5651d';
  ctx.beginPath();
  ctx.ellipse(rx + 12, ry - 20, 7, 10, 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Reindeer head
  ctx.fillStyle = '#c87941';
  ctx.beginPath();
  ctx.ellipse(rx + 18, ry - 27, 9, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Antlers
  ctx.strokeStyle = '#5a3010';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  // Left antler
  ctx.beginPath(); ctx.moveTo(rx + 13, ry - 33); ctx.lineTo(rx + 8, ry - 45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + 8, ry - 45); ctx.lineTo(rx + 4, ry - 40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + 8, ry - 45); ctx.lineTo(rx + 11, ry - 38); ctx.stroke();
  // Right antler
  ctx.beginPath(); ctx.moveTo(rx + 22, ry - 33); ctx.lineTo(rx + 27, ry - 45); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + 27, ry - 45); ctx.lineTo(rx + 31, ry - 40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rx + 27, ry - 45); ctx.lineTo(rx + 24, ry - 38); ctx.stroke();

  // Eyes
  ctx.fillStyle = '#1a0e00';
  ctx.beginPath(); ctx.arc(rx + 20, ry - 29, 1.5, 0, Math.PI * 2); ctx.fill();

  // BLUE NOSE
  const noseGlow = ctx.createRadialGradient(rx + 24, ry - 26, 0, rx + 24, ry - 26, 6);
  noseGlow.addColorStop(0, '#88ccff');
  noseGlow.addColorStop(0.5, '#4499ff');
  noseGlow.addColorStop(1, 'rgba(68,153,255,0)');
  ctx.fillStyle = noseGlow;
  ctx.beginPath(); ctx.arc(rx + 24, ry - 26, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3388ff';
  ctx.beginPath(); ctx.arc(rx + 24, ry - 26, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(rx + 23, ry - 27, 1.2, 0, Math.PI * 2); ctx.fill();

  // PINK HAT
  // Brim
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath();
  ctx.roundRect(rx + 11, ry - 36, 16, 4, 2);
  ctx.fill();
  // Hat body
  const hatGrad = ctx.createLinearGradient(rx + 14, ry - 50, rx + 14, ry - 36);
  hatGrad.addColorStop(0, '#ff9fd4');
  hatGrad.addColorStop(1, '#ff69b4');
  ctx.fillStyle = hatGrad;
  ctx.beginPath();
  ctx.roundRect(rx + 14, ry - 50, 10, 15, [3, 3, 0, 0]);
  ctx.fill();
  // Hat pompom
  ctx.fillStyle = '#fff0f5';
  ctx.beginPath();
  ctx.arc(rx + 19, ry - 52, 4, 0, Math.PI * 2);
  ctx.fill();
  // Hat band
  ctx.fillStyle = '#c9a84c';
  ctx.beginPath();
  ctx.roundRect(rx + 13, ry - 39, 12, 3, 1);
  ctx.fill();

  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) + amt;
  let g = parseInt(hex.slice(3,5),16) + amt;
  let b = parseInt(hex.slice(5,7),16) + amt;
  r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);
  return `rgb(${r},${g},${b})`;
}

function spawnObstacle() {
  const type = Math.floor(Math.random() * vehicleTypes.length);
  const t = vehicleTypes[type];
  obstacles.push({ x: W + 10, y: GROUND, type, w: t.w, h: t.h });
}

function drawGround() {
  // Road
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // Road line dashes
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([20, 15]);
  ctx.lineDashOffset = -(frame * speed * 0.5) % 35;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + (H - GROUND) / 2);
  ctx.lineTo(W, GROUND + (H - GROUND) / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Ground line
  ctx.strokeStyle = '#c9a84c';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
}

function drawBackground() {
  // Dark sky
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, W, GROUND);

  // Stars
  ctx.fillStyle = 'rgba(240,236,228,0.4)';
  for (let i = 0; i < 25; i++) {
    const sx = ((i * 137 + frame * 0.3) % W);
    const sy = (i * 53) % (GROUND - 20);
    const size = i % 3 === 0 ? 1.5 : 0.8;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(201,168,76,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo((x - frame * speed * 0.1) % W, 0);
    ctx.lineTo((x - frame * speed * 0.1) % W, GROUND);
    ctx.stroke();
  }
}

function checkCollision() {
  const bLeft = bulb.x + 6;
  const bRight = bulb.x + bulb.w - 6;
  const bTop = bulb.y - bulb.h + 8;
  const bBottom = bulb.y - 4;

  for (const ob of obstacles) {
    let oLeft, oRight, oTop, oBottom;
    if (ob.isReindeer) {
      oLeft = ob.x + 4;
      oRight = ob.x + ob.w - 4;
      oTop = ob.y - ob.h - 55; // account for reindeer height on top
      oBottom = ob.y - 2;
    } else {
      const t = vehicleTypes[ob.type];
      oLeft = ob.x + 4;
      oRight = ob.x + t.w - 4;
      oTop = ob.y - t.h - t.roofH + 4;
      oBottom = ob.y - 2;
    }

    if (bRight > oLeft && bLeft < oRight && bBottom > oTop && bTop < oBottom) {
      return true;
    }
  }
  return false;
}

function spawnConfetti() {
  confettiPieces = [];
  const colors = ['#c9a84c','#e8c97a','#ff69b4','#4499ff','#ff6b6b','#27ae60','#f0ece4'];
  for (let i = 0; i < 120; i++) {
    confettiPieces.push({
      x: Math.random() * W,
      y: Math.random() * -H,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: 1.5 + Math.random() * 3,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.2,
    });
  }
}

function drawConfetti() {
  confettiPieces.forEach(p => {
    p.y += p.vy;
    p.x += p.vx;
    p.rot += p.rotSpeed;
    if (p.y > H + 10) p.y = -10;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
}

function winGame() {
  gameRunning = false;
  gameWon = true;
  cancelAnimationFrame(animId);
  if (score > bestScore) {
    bestScore = score;
    bestEl.textContent = bestScore;
  }
  spawnConfetti();
  overlayTitle.textContent = '🎉 YOU BEAT IT!';
  overlaySub.textContent = 'Score: 10,000 — You're a legend. Whips Washing salutes you!';
  startBtn.textContent = 'PLAY AGAIN';
  overlay.style.background = 'rgba(8,8,8,0.92)';
  overlay.classList.remove('hidden');
  winConfettiLoop();
}

function winConfettiLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround();
  drawConfetti();
  if (gameWon) requestAnimationFrame(winConfettiLoop);
}

function gameOver() {
  gameRunning = false;
  gameWon = false;
  cancelAnimationFrame(animId);
  if (score > bestScore) {
    bestScore = score;
    bestEl.textContent = bestScore;
  }
  overlayTitle.textContent = 'GAME OVER';
  overlaySub.textContent = `Score: ${score} — ${score > 0 ? 'Not bad!' : 'Try again!'}`;
  startBtn.textContent = 'PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function gameLoop() {
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawGround();

  // Update & draw obstacles
  obstacles = obstacles.filter(ob => ob.x + (ob.isReindeer ? ob.w : vehicleTypes[ob.type].w) > -10);
  obstacles.forEach(ob => {
    ob.x -= speed;
    drawVehicle(ob);
  });

  // Force reindeer spawn at 200
  if (score >= 200 && !reindeerSpawned) {
    reindeerSpawned = true;
    reindeerCar = { x: W + 10, y: GROUND, isReindeer: true, w: 90, h: 38 };
    obstacles.push(reindeerCar);
  }

  // Spawn regular obstacles
  nextObstacle--;
  if (nextObstacle <= 0 && !(score >= 200 && !reindeerSpawned)) {
    spawnObstacle();
    const minGap = Math.max(55, 80 - score * 0.3);
    nextObstacle = minGap + Math.floor(Math.random() * 40);
  }

  // Update bulb
  bulb.update();
  bulb.draw();

  // Score
  frame++;
  if (frame % 6 === 0) {
    score++;
    scoreEl.textContent = score;
    // Speed up gradually
    speed = 5 + score * 0.02;
  }

  // Win at 10000
  if (score >= 10000) {
    winGame();
    return;
  }

  // Collision
  if (checkCollision()) {
    gameOver();
    return;
  }

  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  frame = 0;
  speed = 5;
  obstacles = [];
  nextObstacle = 80;
  reindeerSpawned = false;
  reindeerActive = false;
  reindeerCar = null;
  gameWon = false;
  confettiPieces = [];
  bulb.y = GROUND;
  bulb.vy = 0;
  bulb.jumps = 0;
  bulb.grounded = true;
  scoreEl.textContent = '0';
  overlay.classList.add('hidden');
  gameRunning = true;
  gameLoop();
}

// Controls
function handleJump() {
  if (!gameRunning) return;
  bulb.jump();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!gameRunning) { startGame(); return; }
    handleJump();
  }
});

canvas.addEventListener('click', () => {
  if (!gameRunning) return;
  handleJump();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameRunning) return;
  handleJump();
}, { passive: false });

startBtn.addEventListener('click', startGame);

// Initial draw
ctx.clearRect(0, 0, W, H);
drawBackground();
drawGround();
bulb.draw();
</script>
</body>
</html>
