<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Bored? — Whips Washing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#080808;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;}
body{display:flex;flex-direction:column;align-items:center;
  font-family:'Rajdhani',sans-serif;color:#f0ece4;}
.back{position:fixed;top:0.7rem;left:0.8rem;font-size:0.68rem;
  letter-spacing:0.2em;text-transform:uppercase;color:#a8a09a;
  text-decoration:none;z-index:100;}
.back:hover{color:#c9a84c;}
.titlebar{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
  letter-spacing:0.12em;color:#c9a84c;text-align:center;
  padding:0.25rem 0;flex-shrink:0;line-height:1;}
.hud{display:flex;justify-content:center;gap:2.5rem;
  padding:0.15rem 0;flex-shrink:0;}
.si{text-align:center;}
.sl{font-size:0.58rem;letter-spacing:0.3em;text-transform:uppercase;color:#a8a09a;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#f0ece4;line-height:1;}
.sv.g{color:#c9a84c;}
.wrap{position:relative;flex:1;width:100%;overflow:hidden;
  border-top:1px solid #1e1e1e;border-bottom:1px solid #1e1e1e;min-height:0;}
canvas{display:block;width:100%;height:100%;}
.ov{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(8,8,8,0.91);gap:0.65rem;}
.ov.hidden{display:none;}
.ot{font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.8rem,7vw,3rem);
  letter-spacing:0.1em;color:#c9a84c;text-align:center;padding:0 1rem;}
.os{font-size:clamp(0.82rem,2.8vw,1rem);
  color:#a8a09a;text-align:center;padding:0 1.2rem;line-height:1.5;}
.otip{font-size:0.72rem;color:#c9a84c;text-align:center;
  padding:0 1.2rem;opacity:0.85;}
.ob{font-family:'Rajdhani',sans-serif;font-size:0.82rem;font-weight:500;
  letter-spacing:0.22em;text-transform:uppercase;color:#080808;
  background:#c9a84c;border:none;padding:0.9rem 2.2rem;cursor:pointer;
  border-radius:2px;-webkit-appearance:none;margin-top:0.2rem;}
.ob:active{background:#e8c97a;}
.hint{font-size:0.6rem;letter-spacing:0.1em;color:#a8a09a;
  text-align:center;padding:0.25rem;flex-shrink:0;opacity:0.7;}
</style>
</head>
<body>
<a href="index.html" class="back">&#8592; Back</a>
<div class="titlebar">WHIPS RUNNER</div>
<div class="hud">
  <div class="si"><div class="sl">Score</div><div class="sv" id="sc">0</div></div>
  <div class="si"><div class="sl">Best</div><div class="sv g" id="bs">0</div></div>
</div>
<div class="wrap" id="wrap">
  <canvas id="c"></canvas>
  <div class="ov" id="ov">
    <div class="ot">WHIPS RUNNER</div>
    <div class="os">Help the lightbulb dodge the whips!</div>
    <div class="otip">&#9670; TAP TWICE to double jump &#9670;</div>
    <div class="os" style="font-size:0.72rem;color:#c9a84c;opacity:0.75;">Double jump is key — especially at score 1,000!</div>
    <button class="ob" id="btn" ontouchend="btnTap(event)" onclick="btnTap(event)">START GAME</button>
    <div class="os" style="font-size:0.7rem;">SPACE or TAP to jump</div>
  </div>
</div>
<div class="hint">TAP to jump &bull; TAP TWICE to double jump &bull; Reach 10,000 to win!</div>
<script>
// ── cross-browser helpers ─────────────────────────────────────────────────────
function ell(c,x,y,rx,ry){
  c.save();c.translate(x,y);c.scale(1,ry/rx);
  c.beginPath();c.arc(0,0,rx,0,Math.PI*2);c.restore();
}
function rr(c,x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  var tl=r[0]||0,tr=r[1]||0,br=r[2]||0,bl=r[3]||0;
  c.beginPath();
  c.moveTo(x+tl,y);c.lineTo(x+w-tr,y);c.quadraticCurveTo(x+w,y,x+w,y+tr);
  c.lineTo(x+w,y+h-br);c.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  c.lineTo(x+bl,y+h);c.quadraticCurveTo(x,y+h,x,y+h-bl);
  c.lineTo(x,y+tl);c.quadraticCurveTo(x,y,x+tl,y);
  c.closePath();
}
function lc(h,a){
  var r=Math.min(255,parseInt(h.slice(1,3),16)+a);
  var g=Math.min(255,parseInt(h.slice(3,5),16)+a);
  var b=Math.min(255,parseInt(h.slice(5,7),16)+a);
  return 'rgb('+r+','+g+','+b+')';
}

// ── setup ─────────────────────────────────────────────────────────────────────
var cv=document.getElementById('c');
var ctx=cv.getContext('2d');
var wrap=document.getElementById('wrap');
var ov=document.getElementById('ov');
var btn=document.getElementById('btn');
var scEl=document.getElementById('sc');
var bsEl=document.getElementById('bs');
var ovT=ov.querySelector('.ot');
var ovS=ov.querySelector('.os');

var W=700,H=260;
cv.width=W;cv.height=H;

var GR=H-35,GV=0.58,JP=-13,best=0;

// ── state ─────────────────────────────────────────────────────────────────────
var go=false,won=false,sc=0,fr=0,spd=5;
var obs=[],nxt=80,aid;
var rDone=false,bDone=false;
var conf=[];
var plane={on:false,done:false,x:W+90,y:30};
  blimp={on:false,done:false,x:W+150,y:0};
var blimp={on:false,done:false,x:W+150,y:0};
var star={on:false,done:false,x:-10,y:20,tail:[]};
var ltng={bolts:[],nb:0,flash:0};
var torn={on:false,x:0,ang:0,deb:[]};

// ── vehicle types ─────────────────────────────────────────────────────────────
var VT=[
  {w:72,h:30,c:'#c0392b',rh:18,rw:.55,rx:.2},
  {w:80,h:36,c:'#2980b9',rh:22,rw:.7, rx:.1},
  {w:90,h:38,c:'#27ae60',rh:20,rw:.4, rx:.5},
  {w:68,h:28,c:'#8e44ad',rh:16,rw:.5, rx:.2},
  {w:85,h:36,c:'#d35400',rh:18,rw:.38,rx:.48}
];

// ── bulb ──────────────────────────────────────────────────────────────────────
var bulb={
  x:90,y:GR,w:38,h:48,vy:0,j:0,gr:true,
  jump:function(){
    if(this.j<2){this.vy=this.j===0?JP:JP*.82;this.gr=false;this.j++;}
  },
  upd:function(){
    this.vy+=GV;this.y+=this.vy;
    if(this.y>=GR){this.y=GR;this.vy=0;this.gr=true;this.j=0;}
  },
  draw:function(){
    var cx=this.x+this.w/2,cy=this.y-this.h/2,r=this.w/2;
    var bo=this.gr?Math.sin(fr*.15)*1.5:0;
    ctx.save();ctx.translate(cx,cy+bo);
    // glow
    var gl=ctx.createRadialGradient(0,0,0,0,0,r*1.6);
    gl.addColorStop(0,'rgba(201,168,76,0.22)');gl.addColorStop(1,'rgba(201,168,76,0)');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(0,0,r*1.6,0,Math.PI*2);ctx.fill();
    // body
    var bg=ctx.createRadialGradient(-r*.2,-r*.2,0,0,0,r);
    bg.addColorStop(0,'#fff0a0');bg.addColorStop(.5,'#c9a84c');bg.addColorStop(1,'#7a5510');
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,-r*.1,r,0,Math.PI*2);ctx.fill();
    // base
    ctx.fillStyle='#555';rr(ctx,-r*.38,r*.58,r*.76,r*.56,3);ctx.fill();
    ctx.strokeStyle='#888';ctx.lineWidth=1.5;
    for(var i=0;i<3;i++){
      var ly=r*.66+i*(r*.56/3);
      ctx.beginPath();ctx.moveTo(-r*.38,ly);ctx.lineTo(r*.38,ly);ctx.stroke();
    }
    // X eyes
    var ey=-r*.2,es=r*.17;
    ctx.strokeStyle='#1a0e00';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-r*.32-es,ey-es);ctx.lineTo(-r*.32+es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*.32+es,ey-es);ctx.lineTo(-r*.32-es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.32-es,ey-es);ctx.lineTo(r*.32+es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.32+es,ey-es);ctx.lineTo(r*.32-es,ey+es);ctx.stroke();
    // smile
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,ey+r*.28,r*.22,.2,Math.PI-.2);ctx.stroke();
    // shine
    ctx.fillStyle='rgba(255,255,255,0.38)';
    ctx.save();ctx.translate(-r*.2,-r*.4);ctx.scale(1,0.55);
    ctx.beginPath();ctx.arc(0,0,r*.16,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.restore();
  }
};

// ── draw car ──────────────────────────────────────────────────────────────────
function drawCar(ob){
  var t=VT[ob.tp],bx=ob.x,by=ob.y-t.h;
  ctx.save();
  var bg=ctx.createLinearGradient(bx,by,bx,by+t.h);
  bg.addColorStop(0,lc(t.c,35));bg.addColorStop(1,t.c);
  ctx.fillStyle=bg;rr(ctx,bx,by,t.w,t.h,4);ctx.fill();
  var rrx=bx+t.w*t.rx,rrw=t.w*t.rw;
  var rg=ctx.createLinearGradient(rrx,by-t.rh,rrx,by);
  rg.addColorStop(0,lc(t.c,22));rg.addColorStop(1,t.c);
  ctx.fillStyle=rg;rr(ctx,rrx,by-t.rh,rrw,t.rh+4,[4,4,0,0]);ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.6)';rr(ctx,rrx+3,by-t.rh+3,rrw-6,t.rh-5,2);ctx.fill();
  var wy=by+t.h-1,wr=t.h*.3;
  [bx+t.w*.2,bx+t.w*.78].forEach(function(wx){
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(wx,wy,wr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#666';ctx.beginPath();ctx.arc(wx,wy,wr*.45,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='rgba(255,255,160,0.9)';rr(ctx,bx+t.w-6,by+5,5,8,2);ctx.fill();
  ctx.fillStyle='rgba(255,50,50,0.85)';rr(ctx,bx+1,by+5,5,8,2);ctx.fill();
  ctx.restore();
}

// ── draw reindeer car ─────────────────────────────────────────────────────────
function drawReindeer(ob){
  var bx=ob.x,by=ob.y-ob.h,w=ob.w,h=ob.h;
  ctx.save();
  var bg=ctx.createLinearGradient(bx,by,bx,by+h);
  bg.addColorStop(0,'#ff7070');bg.addColorStop(1,'#c0392b');
  ctx.fillStyle=bg;rr(ctx,bx,by,w,h,4);ctx.fill();
  ctx.strokeStyle='#c9a84c';ctx.lineWidth=2;rr(ctx,bx+2,by+2,w-4,h-4,3);ctx.stroke();
  var rrx=bx+w*.18,rrw=w*.5,rrh=18;
  var rg=ctx.createLinearGradient(rrx,by-rrh,rrx,by);
  rg.addColorStop(0,'#ff9090');rg.addColorStop(1,'#c0392b');
  ctx.fillStyle=rg;rr(ctx,rrx,by-rrh,rrw,rrh+4,[4,4,0,0]);ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.65)';rr(ctx,rrx+3,by-rrh+3,rrw-6,rrh-5,2);ctx.fill();
  var wy=by+h-1,wr=h*.3;
  [bx+w*.2,bx+w*.78].forEach(function(wx){
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(wx,wy,wr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#c9a84c';ctx.beginPath();ctx.arc(wx,wy,wr*.45,0,Math.PI*2);ctx.fill();
  });
  ctx.fillStyle='rgba(100,180,255,0.95)';rr(ctx,bx+w-6,by+6,5,8,2);ctx.fill();
  ctx.fillStyle='rgba(255,50,50,0.9)';rr(ctx,bx+1,by+6,5,8,2);ctx.fill();
  // reindeer body
  var cx=rrx+rrw*.5,cy=by-rrh;
  ctx.fillStyle='#b5651d';
  ctx.save();ctx.translate(cx,cy-14);ctx.scale(1,0.62);
  ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.strokeStyle='#8B4513';ctx.lineWidth=3;ctx.lineCap='round';
  [[-8,-4],[-4,-2],[4,-2],[8,-4]].forEach(function(p){
    ctx.beginPath();ctx.moveTo(cx+p[0],cy+p[1]);ctx.lineTo(cx+p[0]*1.1,cy+6);ctx.stroke();
  });
  // neck
  ctx.fillStyle='#b5651d';
  ctx.save();ctx.translate(cx+12,cy-20);ctx.scale(.7,1);
  ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.restore();ctx.fill();
  // head
  ctx.fillStyle='#c87941';
  ctx.save();ctx.translate(cx+18,cy-27);ctx.scale(1.12,.89);
  ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.restore();ctx.fill();
  // antlers
  ctx.strokeStyle='#5a3010';ctx.lineWidth=2;ctx.lineCap='round';
  [[cx+13,cy-33,cx+8,cy-45],[cx+8,cy-45,cx+4,cy-40],[cx+8,cy-45,cx+11,cy-38],
   [cx+22,cy-33,cx+27,cy-45],[cx+27,cy-45,cx+31,cy-40],[cx+27,cy-45,cx+24,cy-38]
  ].forEach(function(p){ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[2],p[3]);ctx.stroke();});
  ctx.fillStyle='#1a0e00';ctx.beginPath();ctx.arc(cx+20,cy-29,1.5,0,Math.PI*2);ctx.fill();
  // blue nose glow
  var ng=ctx.createRadialGradient(cx+24,cy-26,0,cx+24,cy-26,7);
  ng.addColorStop(0,'#aaddff');ng.addColorStop(.5,'#4499ff');ng.addColorStop(1,'rgba(68,153,255,0)');
  ctx.fillStyle=ng;ctx.beginPath();ctx.arc(cx+24,cy-26,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3388ff';ctx.beginPath();ctx.arc(cx+24,cy-26,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.beginPath();ctx.arc(cx+23,cy-27,1.2,0,Math.PI*2);ctx.fill();
  // pink hat
  ctx.fillStyle='#ff69b4';rr(ctx,cx+11,cy-36,16,4,2);ctx.fill();
  var hg=ctx.createLinearGradient(cx+14,cy-50,cx+14,cy-36);
  hg.addColorStop(0,'#ffaadd');hg.addColorStop(1,'#ff69b4');
  ctx.fillStyle=hg;rr(ctx,cx+14,cy-50,10,15,[3,3,0,0]);ctx.fill();
  ctx.fillStyle='#fff0f8';ctx.beginPath();ctx.arc(cx+19,cy-52,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c9a84c';rr(ctx,cx+13,cy-39,12,3,1);ctx.fill();
  ctx.restore();
}

// ── draw school bus ───────────────────────────────────────────────────────────
function drawBus(ob){
  var bx=ob.x,by=ob.y-ob.h,w=ob.w,h=ob.h;
  ctx.save();
  var bg=ctx.createLinearGradient(bx,by,bx,by+h);
  bg.addColorStop(0,'#ffe234');bg.addColorStop(1,'#e6b800');
  ctx.fillStyle=bg;rr(ctx,bx,by,w,h,3);ctx.fill();
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;rr(ctx,bx,by,w,h,3);ctx.stroke();
  ctx.fillStyle='#111';ctx.fillRect(bx,by+h*.44,w,5);
  ctx.fillStyle='#dda800';rr(ctx,bx+w-22,by,22,h,3);ctx.fill();
  ctx.strokeStyle='#111';ctx.lineWidth=1;rr(ctx,bx+w-22,by,22,h,3);ctx.stroke();
  ctx.fillStyle='rgba(140,210,255,0.7)';
  for(var i=0;i<4;i++){rr(ctx,bx+6+i*20,by+5,14,13,2);ctx.fill();}
  rr(ctx,bx+w-18,by+5,13,13,2);ctx.fill();
  ctx.fillStyle='#111';ctx.font='bold 5px sans-serif';ctx.textAlign='center';
  ctx.fillText('SCHOOL BUS',bx+w*.44,by+h*.38);
  ctx.fillStyle='#cc0000';ctx.beginPath();ctx.arc(bx+5,by+h*.28,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.font='bold 3.5px sans-serif';
  ctx.fillText('STOP',bx+5,by+h*.28+1.2);
  ctx.fillStyle='rgba(255,255,160,0.95)';rr(ctx,bx+w-4,by+7,4,7,1);ctx.fill();
  ctx.fillStyle='rgba(255,50,50,0.9)';rr(ctx,bx+1,by+7,4,7,1);ctx.fill();
  var wy=by+h-1,wr=h*.28;
  [bx+w*.15,bx+w*.5,bx+w*.82].forEach(function(wx){
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(wx,wy,wr,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(wx,wy,wr*.45,0,Math.PI*2);ctx.fill();
  });
  // chihuahua
  var qx=bx+w*.35,qy=by;
  ctx.save();ctx.translate(qx,qy);
  ctx.fillStyle='#f5f0e8';
  ctx.save();ctx.translate(0,-10);ctx.scale(1,.58);ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='rgba(130,90,45,0.5)';
  ctx.save();ctx.translate(4,-9);ctx.scale(1,.8);ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='#f0ebe0';
  ctx.save();ctx.translate(10,-17);ctx.scale(.7,1);ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='#f5f0e8';
  ctx.save();ctx.translate(17,-26);ctx.scale(1.12,.89);ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.restore();ctx.fill();
  // big ears
  ctx.fillStyle='#f5f0e8';
  ctx.save();ctx.translate(11,-33);ctx.scale(.45,1);ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.save();ctx.translate(22,-33);ctx.scale(.45,1);ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='rgba(255,175,185,0.55)';
  ctx.save();ctx.translate(11,-33);ctx.scale(.28,1);ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.save();ctx.translate(22,-33);ctx.scale(.28,1);ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='#1a0e00';ctx.beginPath();ctx.arc(14,-27,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(20,-27,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.beginPath();ctx.arc(13,-28,.9,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(19,-28,.9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(17,-24,1.8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.arc(17,-22,2,.1,Math.PI-.1);ctx.stroke();
  var wag=Math.sin(fr*.2)*14;
  ctx.strokeStyle='#f0ebe0';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-10,-8);ctx.quadraticCurveTo(-18,-16+wag,-13,-23+wag);ctx.stroke();
  ctx.strokeStyle='#e8e2d0';ctx.lineWidth=2.5;
  [[-6,-5],[-2,-5],[4,-5],[8,-5]].forEach(function(p){
    ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[0]+1,3);ctx.stroke();
  });
  ctx.restore();
  ctx.restore();
}

function drawOb(ob){
  if(ob.ri)drawReindeer(ob);
  else if(ob.bu)drawBus(ob);
  else drawCar(ob);
}

// ── background ────────────────────────────────────────────────────────────────
function drawBg(){
  var storm=sc>=1250&&sc<2000;
  var rainbow=sc>=1000&&sc<1250;
  ctx.fillStyle=storm?'#06060f':rainbow?'#08080a':'#080808';
  ctx.fillRect(0,0,W,GR);

  // lightning flash
  if(ltng.flash>0){
    ctx.fillStyle='rgba(160,190,255,'+(Math.min(0.4,ltng.flash*.08))+')';
    ctx.fillRect(0,0,W,GR);ltng.flash--;
  }

  // stars
  if(!storm){
    for(var i=0;i<30;i++){
      var sx=((i*137+fr*.25)%W+W)%W,sy=(i*53)%(GR-15)+5;
      var br=0.2+0.18*Math.sin(fr*.05+i);
      ctx.fillStyle='rgba(240,236,228,'+br+')';
      ctx.beginPath();ctx.arc(sx,sy,i%4===0?1.4:.7,0,Math.PI*2);ctx.fill();
    }
  }

  // rainbow arcs in sky
  if(rainbow){
    var arcC=['rgba(255,0,68,.1)','rgba(255,102,0,.09)','rgba(255,204,0,.09)',
              'rgba(0,200,68,.09)','rgba(0,136,255,.09)','rgba(136,0,255,.09)'];
    for(var ac=0;ac<arcC.length;ac++){
      ctx.strokeStyle=arcC[ac];ctx.lineWidth=14;ctx.beginPath();
      var sh=Math.sin(fr*.03)*12;
      ctx.arc(W*.5+sh,GR+80,175+ac*20,Math.PI,2*Math.PI);ctx.stroke();
    }
  }

  // storm clouds
  if(storm){
    for(var cc=0;cc<6;cc++){
      var cfr2=((cc*165+fr*(0.55+cc*.08))%W+W)%W;
      var ccy=10+cc*11,ccw=50+cc*11,cch=18+cc*4;
      var cca=0.45+0.28*Math.sin(fr*.02+cc);
      ctx.fillStyle='rgba(22,22,42,'+cca+')';
      ctx.save();ctx.translate(cfr2,ccy);ctx.scale(1,cch/ccw);
      ctx.beginPath();ctx.arc(0,0,ccw,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.save();ctx.translate(cfr2+ccw*.45,ccy-cch*.25);ctx.scale(1,(cch*.65)/ccw*.52);
      ctx.beginPath();ctx.arc(0,0,ccw*.52,0,Math.PI*2);ctx.restore();ctx.fill();
    }
    // rain (only 1250-1750)
    if(sc<1750){
      ctx.strokeStyle='rgba(100,130,200,.22)';ctx.lineWidth=1;
      for(var ri=0;ri<45;ri++){
        var rx2=((ri*71+fr*3.5)%W+W)%W,ry2=((ri*39+fr*4.5)%GR+GR)%GR;
        ctx.beginPath();ctx.moveTo(rx2,ry2);ctx.lineTo(rx2-2,ry2+9);ctx.stroke();
      }
    }
  }

  // airplane (400-500, one pass)
  if(sc>=400&&sc<500&&!plane.done){
    if(!plane.on){plane.on=true;plane.x=W+90;plane.y=18+Math.random()*28;}
    if(plane.x>-130){plane.x-=1.6;drawPlane(plane.x,plane.y);}
    else{plane.done=true;}
  }

  // blimp (2000-2250, one pass)
  if(sc>=2000&&sc<2250&&!blimp.done){
    if(!blimp.on){blimp.on=true;blimp.x=W+150;blimp.y=22+Math.random()*20;}
    if(blimp.x>-220){blimp.x-=1.0;drawBlimp(blimp.x,blimp.y);}
    else{blimp.done=true;}
  }

  // shooting star (750-850, one pass)
  if(sc>=750&&sc<850&&!star.done){
    if(!star.on){star.on=true;star.x=-10;star.y=8+Math.random()*38;star.tail=[];}
    if(star.x<W+20){
      star.x+=7;star.y+=2;
      star.tail.push({x:star.x,y:star.y});
      if(star.tail.length>20)star.tail.shift();
      for(var ti=0;ti<star.tail.length;ti++){
        var ta=ti/star.tail.length;
        ctx.fillStyle='rgba(232,201,122,'+(ta*.85)+')';
        ctx.beginPath();ctx.arc(star.tail[ti].x,star.tail[ti].y,ta*2.5,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='rgba(255,255,210,.95)';ctx.beginPath();ctx.arc(star.x,star.y,3,0,Math.PI*2);ctx.fill();
    } else {star.done=true;}
  }

  // lightning (1250-1750)
  if(sc>=1250&&sc<1750){
    ltng.nb--;
    if(ltng.nb<=0){
      var lx=40+Math.random()*(W-80);
      var bpts=[];var lbx=lx,lby=0;
      while(lby<GR-5){bpts.push({x:lbx,y:lby});lbx+=(Math.random()-.5)*22;lby+=8+Math.random()*12;}
      bpts.push({x:lbx,y:GR-2});
      ltng.bolts.push({pts:bpts,life:12});
      ltng.flash=7;ltng.nb=38+Math.floor(Math.random()*65);
    }
    ltng.bolts=ltng.bolts.filter(function(b){return b.life>0;});
    ltng.bolts.forEach(function(b){
      var al=b.life/12;
      ctx.lineCap='round';ctx.lineJoin='round';
      ctx.strokeStyle='rgba(150,130,255,'+(al*.28)+')';ctx.lineWidth=12;
      ctx.beginPath();b.pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.stroke();
      ctx.strokeStyle='rgba(190,210,255,'+(al*.55)+')';ctx.lineWidth=5;
      ctx.beginPath();b.pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.stroke();
      ctx.strokeStyle='rgba(230,245,255,'+(al*.9)+')';ctx.lineWidth=1.8;
      ctx.beginPath();b.pts.forEach(function(p,i){i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);});ctx.stroke();
      // branches
      if(b.pts.length>5){
        [Math.floor(b.pts.length*.35),Math.floor(b.pts.length*.65)].forEach(function(mi){
          var m=b.pts[mi];
          ctx.strokeStyle='rgba(200,220,255,'+(al*.5)+')';ctx.lineWidth=3;
          ctx.beginPath();ctx.moveTo(m.x,m.y);
          var ex=m.x+(Math.random()-.5)*38,ey=m.y+14+Math.random()*24;
          ctx.lineTo(ex,ey);ctx.stroke();
        });
      }
      b.life--;
    });
  }

  // tornado (1750-2000)
  if(sc>=1750&&sc<2000){
    if(!torn.on){
      torn.on=true;torn.x=W*.68;torn.ang=0;
      torn.deb=[
        {t:'cow', a:0,   d:30,s:.038},
        {t:'house',a:2.1,d:38,s:.03},
        {t:'shoe', a:4.2,d:23,s:.05}
      ];
    }
    drawTornado();
  }
}

function drawBlimp(ax,ay){
  ctx.save();
  // Trail
  ctx.strokeStyle='rgba(180,180,180,.12)';ctx.lineWidth=2;ctx.setLineDash([10,12]);
  ctx.beginPath();ctx.moveTo(ax+60,ay+4);ctx.lineTo(ax+160,ay+4);ctx.stroke();
  ctx.setLineDash([]);
  // Main envelope - big rounded oval
  var bg=ctx.createLinearGradient(ax,ay-22,ax,ay+22);
  bg.addColorStop(0,'#d8d8e8');bg.addColorStop(.4,'#c0c0d4');bg.addColorStop(1,'#9090a8');
  ctx.fillStyle=bg;
  // Draw blimp body as scaled circle (mobile safe)
  ctx.save();ctx.translate(ax,ay);ctx.scale(1,.42);
  ctx.beginPath();ctx.arc(0,0,55,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.strokeStyle='rgba(100,100,130,.4)';ctx.lineWidth=1;
  ctx.save();ctx.translate(ax,ay);ctx.scale(1,.42);
  ctx.beginPath();ctx.arc(0,0,55,0,Math.PI*2);ctx.restore();ctx.stroke();
  // Nose cone
  ctx.fillStyle='#a0a0b8';
  ctx.beginPath();ctx.moveTo(ax+55,ay-4);ctx.lineTo(ax+68,ay+2);ctx.lineTo(ax+55,ay+8);ctx.fill();
  // Tail fins
  ctx.fillStyle='#b0b0c8';
  ctx.beginPath();ctx.moveTo(ax-50,ay-12);ctx.lineTo(ax-38,ay-4);ctx.lineTo(ax-34,ay-4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(ax-50,ay+14);ctx.lineTo(ax-38,ay+4);ctx.lineTo(ax-34,ay+4);ctx.closePath();ctx.fill();
  // Gondola (cabin underneath)
  var gg=ctx.createLinearGradient(ax-14,ay+18,ax-14,ay+32);
  gg.addColorStop(0,'#888');gg.addColorStop(1,'#555');
  ctx.fillStyle=gg;rr(ctx,ax-18,ay+18,36,14,3);ctx.fill();
  // Gondola windows
  ctx.fillStyle='rgba(140,210,255,.7)';
  [ax-12,ax-3,ax+6].forEach(function(wx){rr(ctx,wx,ay+21,6,7,1);ctx.fill();});
  // Ropes from envelope to gondola
  ctx.strokeStyle='rgba(100,100,100,.5)';ctx.lineWidth=1;
  [ax-12,ax+0,ax+12].forEach(function(rx){
    ctx.beginPath();ctx.moveTo(rx,ay+22);ctx.lineTo(rx,ay+18);ctx.stroke();
  });
  // Shine on envelope
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.save();ctx.translate(ax-8,ay-14);ctx.scale(1,.35);
  ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.restore();ctx.fill();
  // Banner hanging from gondola
  var bannerY=ay+36;
  ctx.fillStyle='rgba(255,255,255,.92)';rr(ctx,ax-70,bannerY,140,16,3);ctx.fill();
  ctx.strokeStyle='rgba(100,100,100,.3)';ctx.lineWidth=1;rr(ctx,ax-70,bannerY,140,16,3);ctx.stroke();
  // Banner text
  ctx.fillStyle='#c0392b';ctx.font='bold 7px sans-serif';ctx.textAlign='center';
  ctx.fillText("we're not in Kansas anymore",ax,bannerY+11);
  // Banner strings
  ctx.strokeStyle='rgba(80,80,80,.4)';ctx.lineWidth=1;
  [ax-50,ax,ax+50].forEach(function(sx){
    ctx.beginPath();ctx.moveTo(sx,bannerY);ctx.lineTo(sx+(sx-ax)*.15,ay+32);ctx.stroke();
  });
  ctx.restore();
}

function drawPlane(ax,ay){
  ctx.save();
  ctx.strokeStyle='rgba(200,200,200,.16)';ctx.lineWidth=2;ctx.setLineDash([8,10]);
  ctx.beginPath();ctx.moveTo(ax+40,ay+2);ctx.lineTo(ax+100,ay+2);ctx.stroke();
  ctx.setLineDash([]);
  var bg=ctx.createLinearGradient(ax,ay-8,ax,ay+8);
  bg.addColorStop(0,'#e8e8e8');bg.addColorStop(1,'#c0c0c0');
  ctx.fillStyle=bg;ctx.save();ctx.translate(ax,ay);ctx.scale(1,.23);ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.restore();ctx.fill();
  ctx.fillStyle='#b0b0b0';ctx.beginPath();ctx.moveTo(ax+35,ay-2);ctx.lineTo(ax+48,ay+2);ctx.lineTo(ax+35,ay+6);ctx.fill();
  ctx.fillStyle='#b8b8b8';ctx.beginPath();ctx.moveTo(ax-30,ay-10);ctx.lineTo(ax-22,ay-2);ctx.lineTo(ax-14,ay-2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#d0d0d0';
  ctx.beginPath();ctx.moveTo(ax-2,ay);ctx.lineTo(ax+12,ay-22);ctx.lineTo(ax+20,ay-22);ctx.lineTo(ax+10,ay+2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(ax-2,ay);ctx.lineTo(ax+12,ay+22);ctx.lineTo(ax+20,ay+22);ctx.lineTo(ax+10,ay+2);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(140,210,255,.75)';
  for(var w2=0;w2<5;w2++){ctx.beginPath();ctx.arc(ax-10+w2*9,ay,2.5,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function drawTornado(){
  torn.ang+=0.022;
  var tx=torn.x,ty=GR;
  // sky darkening
  var td=ctx.createRadialGradient(tx,GR*.4,0,tx,GR*.4,190);
  td.addColorStop(0,'rgba(20,15,40,.5)');td.addColorStop(1,'rgba(20,15,40,0)');
  ctx.fillStyle=td;ctx.fillRect(tx-190,0,380,GR);
  // funnel
  for(var seg=0;seg<18;seg++){
    var prog=seg/17,wid=84-prog*74,gy=GR*.08+prog*(ty-GR*.08);
    var wob=Math.sin(fr*.07+seg*.9)*5*(1-prog);
    var al=.16+prog*.32+Math.sin(fr*.05+seg)*.06;
    ctx.fillStyle='rgba('+(50+prog*20|0)+','+(45+prog*18|0)+','+(80+prog*30|0)+','+al+')';
    ctx.save();ctx.translate(tx+wob,gy);ctx.scale(1,8/Math.max(1,wid));
    ctx.beginPath();ctx.arc(0,0,Math.max(2,wid),0,Math.PI*2);ctx.restore();ctx.fill();
  }
  // swirl lines
  for(var s=0;s<5;s++){
    var ba=torn.ang*1.4+s*(Math.PI*2/5);
    ctx.lineCap='round';ctx.lineWidth=1.8;
    ctx.beginPath();
    for(var step=0;step<22;step++){
      var p=step/21,r2=(84-p*74)*.78,a2=ba+p*Math.PI*4;
      var gy2=GR*.08+p*(ty-GR*.08);
      var px=tx+Math.cos(a2)*r2;
      step===0?ctx.moveTo(px,gy2):ctx.lineTo(px,gy2);
    }
    var sg=ctx.createLinearGradient(tx,GR*.08,tx,ty);
    sg.addColorStop(0,'rgba(120,110,180,0)');
    sg.addColorStop(.4,'rgba(130,120,200,.38)');
    sg.addColorStop(1,'rgba(100,90,160,0)');
    ctx.strokeStyle=sg;ctx.stroke();
  }
  // dust
  var dg=ctx.createRadialGradient(tx,ty,0,tx,ty,75);
  dg.addColorStop(0,'rgba(90,75,55,.6)');dg.addColorStop(.5,'rgba(70,58,42,.35)');dg.addColorStop(1,'rgba(50,40,30,0)');
  ctx.fillStyle=dg;ctx.save();ctx.translate(tx,ty);ctx.scale(1,.24);ctx.beginPath();ctx.arc(0,0,75,0,Math.PI*2);ctx.restore();ctx.fill();
  // debris
  torn.deb.forEach(function(d){
    d.a+=d.s;
    var dx=tx+Math.cos(d.a)*d.d,dy=ty-GR*.45+Math.sin(d.a*.6)*16;
    ctx.save();ctx.translate(dx,dy);ctx.rotate(d.a*2);
    if(d.t==='cow'){
      ctx.fillStyle='#f0ece4';ctx.save();ctx.scale(1,.55);ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.fillStyle='#2a2a2a';ctx.save();ctx.translate(0,-4);ctx.scale(1,.75);ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.fillStyle='rgba(80,60,40,.6)';ctx.save();ctx.translate(4,1);ctx.scale(1,.6);ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1.5;ctx.lineCap='round';
      [[-6,3],[-3,3],[3,3],[6,3]].forEach(function(p){ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[0],p[1]+4);ctx.stroke();});
    } else if(d.t==='house'){
      ctx.fillStyle='#c87941';rr(ctx,-9,-4,18,11,2);ctx.fill();
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.moveTo(-11,-4);ctx.lineTo(0,-15);ctx.lineTo(11,-4);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(140,210,255,.65)';rr(ctx,-7,-1,5,6,1);ctx.fill();rr(ctx,2,-1,5,6,1);ctx.fill();
    } else {
      ctx.fillStyle='#cc0000';ctx.save();ctx.scale(1,.45);ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.fillStyle='#ff3333';ctx.save();ctx.translate(-2,-3);ctx.scale(1,.43);ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.restore();ctx.fill();
      ctx.fillStyle='rgba(255,220,50,.9)';
      for(var sp=0;sp<4;sp++){var sa=sp*Math.PI*.5+fr*.25;ctx.beginPath();ctx.arc(Math.cos(sa)*9,Math.sin(sa)*5,1.5,0,Math.PI*2);ctx.fill();}
    }
    ctx.restore();
  });
}

// ── ground ────────────────────────────────────────────────────────────────────
function drawGround(){
  var rainbow=sc>=1000&&sc<1250;
  var roadH=H-GR;
  if(rainbow){
    var cols=['#ff0044','#ff6600','#ffcc00','#00cc44','#0088ff','#8800ff','#ff00cc'];
    var sw=38,off=(fr*spd*.8)%sw;
    for(var s=0;s<Math.ceil(W/sw)+2;s++){
      var sx=s*sw-off;
      var c1=cols[(s+Math.floor(fr*spd*.8/sw))%cols.length];
      var c2=cols[(s+1+Math.floor(fr*spd*.8/sw))%cols.length];
      var rg=ctx.createLinearGradient(sx,GR,sx+sw,GR);
      rg.addColorStop(0,c1);rg.addColorStop(1,c2);
      ctx.fillStyle=rg;ctx.fillRect(sx,GR,sw+1,roadH);
    }
    // shimmer
    var sh=ctx.createLinearGradient(0,GR,0,H);
    sh.addColorStop(0,'rgba(255,255,255,.18)');sh.addColorStop(.4,'rgba(255,255,255,.06)');sh.addColorStop(1,'rgba(0,0,0,.35)');
    ctx.fillStyle=sh;ctx.fillRect(0,GR,W,roadH);
    // sparkles
    for(var sp2=0;sp2<12;sp2++){
      var spx=((sp2*97+fr*spd*1.2)%W+W)%W;
      var spy=GR+4+((sp2*31)%(roadH*.7));
      var ss=0.4+Math.sin(fr*.2+sp2)*.4;
      ctx.globalAlpha=ss*.8;ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.beginPath();ctx.arc(spx,spy,1.2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    // white edge
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,GR);ctx.lineTo(W,GR);ctx.stroke();
  } else {
    var gG=ctx.createLinearGradient(0,GR,0,H);
    gG.addColorStop(0,'#1c1c1c');gG.addColorStop(1,'#141414');
    ctx.fillStyle=gG;ctx.fillRect(0,GR,W,roadH);
    ctx.strokeStyle='rgba(201,168,76,.5)';ctx.lineWidth=1.5;
    ctx.setLineDash([20,16]);ctx.lineDashOffset=-(fr*spd*.5)%36;
    ctx.beginPath();ctx.moveTo(0,GR+(H-GR)/2);ctx.lineTo(W,GR+(H-GR)/2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle='#c9a84c';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,GR);ctx.lineTo(W,GR);ctx.stroke();
  }
}

// ── collision ─────────────────────────────────────────────────────────────────
function hitTest(){
  var bL=bulb.x+7,bR=bulb.x+bulb.w-7,bT=bulb.y-bulb.h+10,bB=bulb.y-5;
  for(var i=0;i<obs.length;i++){
    var ob=obs[i],oL,oR,oT,oB;
    if(ob.ri){oL=ob.x+4;oR=ob.x+ob.w-4;oT=ob.y-ob.h-50;oB=ob.y-2;}
    else if(ob.bu){oL=ob.x+4;oR=ob.x+ob.w-4;oT=ob.y-ob.h-30;oB=ob.y-2;}
    else{var t=VT[ob.tp];oL=ob.x+4;oR=ob.x+t.w-4;oT=ob.y-t.h-t.rh+5;oB=ob.y-2;}
    if(bR>oL&&bL<oR&&bB>oT&&bT<oB)return true;
  }
  return false;
}

// ── confetti ──────────────────────────────────────────────────────────────────
function mkConf(){
  conf=[];
  var cols=['#c9a84c','#e8c97a','#ff69b4','#4499ff','#ff6b6b','#27ae60','#f0ece4','#ff9944'];
  for(var i=0;i<140;i++){
    conf.push({x:Math.random()*W,y:Math.random()*-H,
      w:5+Math.random()*9,h:3+Math.random()*7,
      c:cols[Math.floor(Math.random()*cols.length)],
      vy:1.5+Math.random()*3.5,vx:(Math.random()-.5)*2.5,
      r:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.2});
  }
}
function drawConf(){
  conf.forEach(function(p){
    p.y+=p.vy;p.x+=p.vx;p.r+=p.rs;if(p.y>H+10)p.y=-10;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
    ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
  });
}
function winLoop(){ctx.clearRect(0,0,W,H);drawBg();drawGround();drawConf();if(won)requestAnimationFrame(winLoop);}

// ── end screens ───────────────────────────────────────────────────────────────
function endWin(){
  go=false;won=true;cancelAnimationFrame(aid);
  if(sc>best){best=sc;bsEl.textContent=best;}
  mkConf();ovT.textContent='YOU BEAT IT!';
  ovS.textContent="Score: 10,000 — You're a legend. Whips Washing salutes you!";
  btn.textContent='PLAY AGAIN';ov.classList.remove('hidden');winLoop();
}
function endDead(){
  go=false;won=false;cancelAnimationFrame(aid);
  if(sc>best){best=sc;bsEl.textContent=best;}
  ovT.textContent='GAME OVER';
  ovS.textContent='Score: '+sc+' — '+(sc>0?'Not bad! Try again!':'Try again!');
  btn.textContent='PLAY AGAIN';ov.classList.remove('hidden');
}

// ── game loop ─────────────────────────────────────────────────────────────────
function spawnOb(){
  var tp=Math.floor(Math.random()*VT.length);
  obs.push({x:W+10,y:GR,tp:tp,w:VT[tp].w,h:VT[tp].h});
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawBg();drawGround();

  obs=obs.filter(function(ob){return ob.x+(ob.ri||ob.bu?ob.w:VT[ob.tp].w)>-10;});
  obs.forEach(function(ob){ob.x-=(ob.bu?5:spd);drawOb(ob);});

  if(sc>=200&&!rDone){rDone=true;obs.push({x:W+10,y:GR,ri:true,w:90,h:38});nxt=100;}
  if(sc>=1000&&!bDone){bDone=true;obs.push({x:W+10,y:GR,bu:true,w:110,h:44});nxt=120;}

  nxt--;
  if(nxt<=0){
    spawnOb();
    var gap=sc<=250?82:Math.max(46,82-Math.floor((sc-250)/100)*3);
    nxt=gap+Math.floor(Math.random()*42);
  }

  bulb.upd();bulb.draw();

  fr++;
  if(fr%6===0){
    sc++;scEl.textContent=sc;
    spd=sc<=250?5:5+Math.floor((sc-250)/100)*.4;
  }

  if(sc>=10000){endWin();return;}
  if(hitTest()){endDead();return;}
  aid=requestAnimationFrame(loop);
}

// ── start ─────────────────────────────────────────────────────────────────────
function startGame(){
  sc=0;fr=0;spd=5;obs=[];nxt=80;
  rDone=false;bDone=false;won=false;conf=[];
  plane={on:false,done:false,x:W+90,y:30};
  blimp={on:false,done:false,x:W+150,y:0};
  star={on:false,done:false,x:-10,y:20,tail:[]};
  ltng={bolts:[],nb:0,flash:0};
  torn={on:false,x:0,ang:0,deb:[]};
  bulb.y=GR;bulb.vy=0;bulb.j=0;bulb.gr=true;
  scEl.textContent='0';ov.classList.add('hidden');
  go=true;loop();
}

    e.preventDefault();if(!go){startGame();return;}bulb.jump();
  }
});
document.getElementById('wrap').addEventListener('touchstart',function(e){
  e.preventDefault();if(!go)return;bulb.jump();
},{passive:false});
document.getElementById('wrap').addEventListener('click',function(e){
  e.preventDefault();if(!go)return;bulb.jump();
});
function btnTap(e){if(e)e.preventDefault();if(e)e.stopPropagation();startGame();}
document.getElementById('btn').addEventListener('click',btnTap);
