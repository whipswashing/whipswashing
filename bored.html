<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Bored? — Whips Washing</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #080808; --gold: #c9a84c; --gold-light: #e8c97a;
      --white: #f0ece4; --muted: #a8a09a; --card: #111111; --border: #1e1e1e;
    }
    body {
      background: var(--black); color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      overflow: hidden; user-select: none; -webkit-user-select: none;
      touch-action: manipulation;
    }
    .back-link {
      position: fixed; top: 1.2rem; left: 1.2rem;
      font-family: 'Rajdhani', sans-serif; font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.3s; z-index: 100;
    }
    .back-link:hover { color: var(--gold); }
    .game-container {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.8rem; width: 100%; max-width: 720px; padding: 1rem;
    }
    .game-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem,5vw,2.8rem);
      letter-spacing: 0.1em; color: var(--gold); text-align: center;
    }
    .score-board { display: flex; gap: 3rem; align-items: center; }
    .score-item { text-align: center; }
    .score-label { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }
    .score-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--white); letter-spacing: 0.05em; line-height: 1; }
    .score-value.gold { color: var(--gold); }
    .canvas-wrapper { position: relative; width: 100%; border: 1px solid var(--border); background: var(--card); overflow: hidden; }
    canvas { display: block; width: 100%; }
    .overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(8,8,8,0.88); gap: 0.8rem;
    }
    .overlay.hidden { display: none; }
    .overlay-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2rem,6vw,3.5rem);
      letter-spacing: 0.1em; color: var(--gold); text-align: center; padding: 0 1rem;
    }
    .overlay-sub {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(0.85rem,2.5vw,1.05rem);
      font-style: italic; color: var(--muted); text-align: center; padding: 0 1rem;
    }
    .overlay-btn {
      margin-top: 0.5rem; font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--black); background: var(--gold);
      border: none; padding: 0.9rem 2.2rem; cursor: pointer;
      border-radius: 2px; transition: background 0.3s; -webkit-appearance: none;
    }
    .overlay-btn:hover, .overlay-btn:active { background: var(--gold-light); }
    .hint { font-size: 0.68rem; letter-spacing: 0.15em; color: var(--muted); text-align: center; opacity: 0.7; padding: 0 1rem; }
  </style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back</a>
<div class="game-container">
  <div class="game-title">WHIPS RUNNER</div>
  <div class="score-board">
    <div class="score-item"><div class="score-label">Score</div><div class="score-value" id="score">0</div></div>
    <div class="score-item"><div class="score-label">Best</div><div class="score-value gold" id="best">0</div></div>
  </div>
  <div class="canvas-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title">WHIPS RUNNER</div>
      <div class="overlay-sub">Help the lightbulb dodge the whips!</div>
      <button class="overlay-btn" id="startBtn">START GAME</button>
      <div class="hint">SPACE or TAP to jump &bull; Double jump available!</div>
    </div>
  </div>
  <div class="hint">SPACE or TAP to jump &bull; Double jump &bull; Survive to 10,000!</div>
</div>
<script>
function rrect(c,x,y,w,h,r){
  if(typeof r==='number')r=[r,r,r,r];
  var tl=r[0]||0,tr=r[1]||0,br=r[2]||0,bl=r[3]||0;
  c.beginPath();
  c.moveTo(x+tl,y); c.lineTo(x+w-tr,y); c.quadraticCurveTo(x+w,y,x+w,y+tr);
  c.lineTo(x+w,y+h-br); c.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
  c.lineTo(x+bl,y+h); c.quadraticCurveTo(x,y+h,x,y+h-bl);
  c.lineTo(x,y+tl); c.quadraticCurveTo(x,y,x+tl,y);
  c.closePath();
}
function lighten(hex,amt){
  var r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  var g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  var b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return 'rgb('+r+','+g+','+b+')';
}

var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var overlay=document.getElementById('overlay');
var startBtn=document.getElementById('startBtn');
var scoreEl=document.getElementById('score');
var bestEl=document.getElementById('best');
var overlayTitle=overlay.querySelector('.overlay-title');
var overlaySub=overlay.querySelector('.overlay-sub');

var W=700,H=200;
canvas.width=W; canvas.height=H;
var GROUND=H-30,GRAVITY=0.6,JUMP_FORCE=-13,bestScore=0;

var gameRunning=false,gameWon=false,score=0,frame=0,speed=5;
var obstacles=[],nextObstacle=80,animId;
var reindeerSpawned=false,reindeerPassed=false,savedSpeed=5,confettiPieces=[];

var bulb={
  x:80,y:GROUND,w:38,h:48,vy:0,jumps:0,maxJumps:2,grounded:true,
  jump:function(){
    if(this.jumps<this.maxJumps){
      this.vy=this.jumps===0?JUMP_FORCE:JUMP_FORCE*0.85;
      this.grounded=false; this.jumps++;
    }
  },
  update:function(){
    this.vy+=GRAVITY; this.y+=this.vy;
    if(this.y>=GROUND){this.y=GROUND;this.vy=0;this.grounded=true;this.jumps=0;}
  },
  draw:function(){
    var cx=this.x+this.w/2,cy=this.y-this.h/2,r=this.w/2;
    var bounce=this.grounded?Math.sin(frame*0.15)*1.5:0;
    ctx.save(); ctx.translate(cx,cy+bounce);
    var glow=ctx.createRadialGradient(0,0,r*0.3,0,0,r*1.4);
    glow.addColorStop(0,'rgba(201,168,76,0.25)'); glow.addColorStop(1,'rgba(201,168,76,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r*1.4,0,Math.PI*2); ctx.fill();
    var bg=ctx.createRadialGradient(-r*0.25,-r*0.25,0,0,0,r);
    bg.addColorStop(0,'#ffe87a'); bg.addColorStop(0.5,'#c9a84c'); bg.addColorStop(1,'#8a6520');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,-r*0.1,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5a5a5a'; rrect(ctx,-r*0.38,r*0.6,r*0.76,r*0.55,3); ctx.fill();
    ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    for(var i=0;i<3;i++){var ly=r*0.68+i*(r*0.55/3);ctx.beginPath();ctx.moveTo(-r*0.38,ly);ctx.lineTo(r*0.38,ly);ctx.stroke();}
    var ey=-r*0.2,es=r*0.18;
    ctx.strokeStyle='#1a0e00'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-r*0.32-es,ey-es);ctx.lineTo(-r*0.32+es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*0.32+es,ey-es);ctx.lineTo(-r*0.32-es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.32-es,ey-es);ctx.lineTo(r*0.32+es,ey+es);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*0.32+es,ey-es);ctx.lineTo(r*0.32-es,ey+es);ctx.stroke();
    ctx.strokeStyle='#1a0e00'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,ey+r*0.28,r*0.22,0.2,Math.PI-0.2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.ellipse(-r*0.22,-r*0.42,r*0.18,r*0.1,-0.6,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
};

var vehicleTypes=[
  {name:'sedan', w:72,h:30,color:'#c0392b',roofH:18,roofW:0.55,roofX:0.2},
  {name:'suv',   w:80,h:36,color:'#2980b9',roofH:22,roofW:0.7, roofX:0.1},
  {name:'truck', w:90,h:38,color:'#27ae60',roofH:20,roofW:0.4, roofX:0.5},
  {name:'coupe', w:68,h:28,color:'#8e44ad',roofH:16,roofW:0.5, roofX:0.2},
  {name:'pickup',w:85,h:36,color:'#d35400',roofH:18,roofW:0.38,roofX:0.48}
];

function drawVehicle(ob){
  if(ob.isReindeer){drawReindeerCar(ob);return;}
  var t=vehicleTypes[ob.type],bx=ob.x,by=ob.y-t.h;
  ctx.save();
  var bg=ctx.createLinearGradient(bx,by,bx,by+t.h);
  bg.addColorStop(0,lighten(t.color,30)); bg.addColorStop(1,t.color);
  ctx.fillStyle=bg; rrect(ctx,bx,by,t.w,t.h,4); ctx.fill();
  var rx=bx+t.w*t.roofX,rw=t.w*t.roofW;
  var rg=ctx.createLinearGradient(rx,by-t.roofH,rx,by);
  rg.addColorStop(0,lighten(t.color,20)); rg.addColorStop(1,t.color);
  ctx.fillStyle=rg; rrect(ctx,rx,by-t.roofH,rw,t.roofH+4,[4,4,0,0]); ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.55)'; rrect(ctx,rx+3,by-t.roofH+3,rw-6,t.roofH-4,2); ctx.fill();
  var wy=by+t.h-1,wr=t.h*0.32;
  [bx+t.w*0.2,bx+t.w*0.78].forEach(function(wx){
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(wx,wy,wr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(wx,wy,wr*0.5,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='rgba(255,255,180,0.9)'; rrect(ctx,bx+t.w-6,by+6,5,8,2); ctx.fill();
  ctx.fillStyle='rgba(255,60,60,0.85)'; rrect(ctx,bx+1,by+6,5,8,2); ctx.fill();
  ctx.restore();
}

function drawReindeerCar(ob){
  var bx=ob.x,by=ob.y-ob.h,w=ob.w,h=ob.h;
  ctx.save();
  var bg=ctx.createLinearGradient(bx,by,bx,by+h);
  bg.addColorStop(0,'#ff6b6b'); bg.addColorStop(1,'#c0392b');
  ctx.fillStyle=bg; rrect(ctx,bx,by,w,h,4); ctx.fill();
  ctx.strokeStyle='#c9a84c'; ctx.lineWidth=2; rrect(ctx,bx+2,by+2,w-4,h-4,3); ctx.stroke();
  var rx=bx+w*0.18,rw=w*0.5,rh=18;
  var rg=ctx.createLinearGradient(rx,by-rh,rx,by);
  rg.addColorStop(0,'#ff8a8a'); rg.addColorStop(1,'#c0392b');
  ctx.fillStyle=rg; rrect(ctx,rx,by-rh,rw,rh+4,[4,4,0,0]); ctx.fill();
  ctx.fillStyle='rgba(150,220,255,0.6)'; rrect(ctx,rx+3,by-rh+3,rw-6,rh-5,2); ctx.fill();
  var wy=by+h-1,wr=h*0.32;
  [bx+w*0.2,bx+w*0.78].forEach(function(wx){
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(wx,wy,wr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#c9a84c'; ctx.beginPath(); ctx.arc(wx,wy,wr*0.5,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='rgba(100,180,255,0.95)'; rrect(ctx,bx+w-6,by+6,5,8,2); ctx.fill();
  ctx.fillStyle='rgba(255,60,60,0.9)'; rrect(ctx,bx+1,by+6,5,8,2); ctx.fill();
  var cx=rx+rw*0.5,cy=by-rh;
  ctx.fillStyle='#b5651d'; ctx.beginPath(); ctx.ellipse(cx,cy-14,16,10,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8B4513'; ctx.lineWidth=3; ctx.lineCap='round';
  [[-8,-10],[-4,-8],[4,-8],[8,-10]].forEach(function(p){
    ctx.beginPath(); ctx.moveTo(cx+p[0],cy+p[1]); ctx.lineTo(cx+p[0]*1.2,cy+2); ctx.stroke();
  });
  ctx.fillStyle='#b5651d'; ctx.beginPath(); ctx.ellipse(cx+12,cy-20,7,10,0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c87941'; ctx.beginPath(); ctx.ellipse(cx+18,cy-27,9,8,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  [[cx+13,cy-33,cx+8,cy-45],[cx+8,cy-45,cx+4,cy-40],[cx+8,cy-45,cx+11,cy-38],
   [cx+22,cy-33,cx+27,cy-45],[cx+27,cy-45,cx+31,cy-40],[cx+27,cy-45,cx+24,cy-38]].forEach(function(p){
    ctx.beginPath(); ctx.moveTo(p[0],p[1]); ctx.lineTo(p[2],p[3]); ctx.stroke();
  });
  ctx.fillStyle='#1a0e00'; ctx.beginPath(); ctx.arc(cx+20,cy-29,1.5,0,Math.PI*2); ctx.fill();
  var ng=ctx.createRadialGradient(cx+24,cy-26,0,cx+24,cy-26,6);
  ng.addColorStop(0,'#88ccff'); ng.addColorStop(0.5,'#4499ff'); ng.addColorStop(1,'rgba(68,153,255,0)');
  ctx.fillStyle=ng; ctx.beginPath(); ctx.arc(cx+24,cy-26,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3388ff'; ctx.beginPath(); ctx.arc(cx+24,cy-26,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.beginPath(); ctx.arc(cx+23,cy-27,1.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff69b4'; rrect(ctx,cx+11,cy-36,16,4,2); ctx.fill();
  var hg=ctx.createLinearGradient(cx+14,cy-50,cx+14,cy-36);
  hg.addColorStop(0,'#ff9fd4'); hg.addColorStop(1,'#ff69b4');
  ctx.fillStyle=hg; rrect(ctx,cx+14,cy-50,10,15,[3,3,0,0]); ctx.fill();
  ctx.fillStyle='#fff0f5'; ctx.beginPath(); ctx.arc(cx+19,cy-52,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c9a84c'; rrect(ctx,cx+13,cy-39,12,3,1); ctx.fill();
  ctx.restore();
}

function drawBackground(){
  ctx.fillStyle='#080808'; ctx.fillRect(0,0,W,GROUND);
  ctx.fillStyle='rgba(240,236,228,0.35)';
  for(var i=0;i<25;i++){
    var sx=((i*137+frame*0.3)%W),sy=(i*53)%(GROUND-20);
    ctx.beginPath(); ctx.arc(sx,sy,i%3===0?1.4:0.7,0,Math.PI*2); ctx.fill();
  }
}
function drawGround(){
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,GROUND,W,H-GROUND);
  ctx.strokeStyle='#c9a84c'; ctx.lineWidth=1.5;
  ctx.setLineDash([20,15]); ctx.lineDashOffset=-(frame*speed*0.5)%35;
  ctx.beginPath(); ctx.moveTo(0,GROUND+(H-GROUND)/2); ctx.lineTo(W,GROUND+(H-GROUND)/2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();
}

function checkCollision(){
  var bL=bulb.x+6,bR=bulb.x+bulb.w-6,bT=bulb.y-bulb.h+8,bB=bulb.y-4;
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i],oL,oR,oT,oB;
    if(ob.isReindeer){
      oL=ob.x+4; oR=ob.x+ob.w-4; oT=ob.y-ob.h-55; oB=ob.y-2;
    } else {
      var t=vehicleTypes[ob.type];
      oL=ob.x+4; oR=ob.x+t.w-4; oT=ob.y-t.h-t.roofH+4; oB=ob.y-2;
    }
    if(bR>oL&&bL<oR&&bB>oT&&bT<oB) return true;
  }
  return false;
}

function spawnConfetti(){
  confettiPieces=[];
  var colors=['#c9a84c','#e8c97a','#ff69b4','#4499ff','#ff6b6b','#27ae60','#f0ece4'];
  for(var i=0;i<120;i++){
    confettiPieces.push({
      x:Math.random()*W,y:Math.random()*-H,
      w:6+Math.random()*8,h:4+Math.random()*6,
      color:colors[Math.floor(Math.random()*colors.length)],
      vy:1.5+Math.random()*3,vx:(Math.random()-0.5)*2,
      rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.2
    });
  }
}
function drawConfetti(){
  confettiPieces.forEach(function(p){
    p.y+=p.vy; p.x+=p.vx; p.rot+=p.rotSpeed;
    if(p.y>H+10) p.y=-10;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
}
function winConfettiLoop(){
  ctx.clearRect(0,0,W,H); drawBackground(); drawGround(); drawConfetti();
  if(gameWon) requestAnimationFrame(winConfettiLoop);
}

function winGame(){
  gameRunning=false; gameWon=true; cancelAnimationFrame(animId);
  if(score>bestScore){bestScore=score;bestEl.textContent=bestScore;}
  spawnConfetti();
  overlayTitle.textContent='YOU BEAT IT!';
  overlaySub.textContent="Score: 10,000 — You're a legend. Whips Washing salutes you!";
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
  winConfettiLoop();
}
function gameOver(){
  gameRunning=false; gameWon=false; cancelAnimationFrame(animId);
  if(score>bestScore){bestScore=score;bestEl.textContent=bestScore;}
  overlayTitle.textContent='GAME OVER';
  overlaySub.textContent='Score: '+score+' — '+(score>0?'Not bad!':'Try again!');
  startBtn.textContent='PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function spawnObstacle(){
  var type=Math.floor(Math.random()*vehicleTypes.length);
  var t=vehicleTypes[type];
  obstacles.push({x:W+10,y:GROUND,type:type,w:t.w,h:t.h});
}

function gameLoop(){
  ctx.clearRect(0,0,W,H);
  drawBackground(); drawGround();
  obstacles=obstacles.filter(function(ob){
    return ob.x+(ob.isReindeer?ob.w:vehicleTypes[ob.type].w)>-10;
  });
  obstacles.forEach(function(ob){ob.x-=speed; drawVehicle(ob);});
  if(score>=200&&!reindeerSpawned){
    reindeerSpawned=true;
    savedSpeed=speed;
    speed=2.2;
    obstacles.push({x:W+10,y:GROUND,isReindeer:true,w:90,h:38});
    nextObstacle=90;
  }
  // Restore speed after reindeer passes
  if(reindeerSpawned&&!reindeerPassed){
    var rd=obstacles.filter(function(o){return o.isReindeer;});
    if(rd.length===0&&reindeerSpawned){
      reindeerPassed=true;
      speed=savedSpeed;
    }
  }
  nextObstacle--;
  if(nextObstacle<=0){
    spawnObstacle();
    var minGap=Math.max(55,80-score*0.03);
    nextObstacle=minGap+Math.floor(Math.random()*40);
  }
  bulb.update(); bulb.draw();
  frame++;
  if(frame%6===0){score++;scoreEl.textContent=score;speed=5+score*0.018;}
  if(score>=10000){winGame();return;}
  if(checkCollision()){gameOver();return;}
  animId=requestAnimationFrame(gameLoop);
}

function startGame(){
  score=0;frame=0;speed=5;obstacles=[];nextObstacle=80;
  reindeerSpawned=false;reindeerPassed=false;savedSpeed=5;gameWon=false;confettiPieces=[];
  bulb.y=GROUND;bulb.vy=0;bulb.jumps=0;bulb.grounded=true;
  scoreEl.textContent='0';
  overlay.classList.add('hidden');
  gameRunning=true;
  gameLoop();
}

document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.key===' '){
    e.preventDefault();
    if(!gameRunning){startGame();return;}
    bulb.jump();
  }
});
canvas.addEventListener('click',function(e){
  e.preventDefault();
  if(!gameRunning) return;
  bulb.jump();
});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(!gameRunning) return;
  bulb.jump();
},{passive:false});
startBtn.addEventListener('click',function(e){
  e.preventDefault();
  e.stopPropagation();
  startGame();
});

drawBackground(); drawGround(); bulb.draw();
</script>
</body>
</html>
